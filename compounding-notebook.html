<!DOCTYPE html>
<html lang="en" data-theme="parchment">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Compounding Notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --content-scale: 1;
  }

  /* ===== THEMES ===== */
  html[data-theme="parchment"]{
    --paper: #f2e8d5;
    --paper-2: #e9dcc0;
    --ink: #3a2f22;
    --ink-soft: #6b5b45;
    --accent: #a34d2e;
    --accent-soft: #c97a4a33;
    --line: #cbb890;
    --tab-bg: #d9c49a;
    --room: #d8cbb2;
    --shadow: rgba(60,40,10,.35);
  }
  html[data-theme="night"]{
    --paper: #21201c;
    --paper-2: #2b2a24;
    --ink: #e7ddc9;
    --ink-soft: #a89c85;
    --accent: #d99a56;
    --accent-soft: #d99a5633;
    --line: #45433a;
    --tab-bg: #3a3830;
    --room: #171613;
    --shadow: rgba(0,0,0,.6);
  }
  html[data-theme="kraft"]{
    --paper: #d8c4a0;
    --paper-2: #cbb389;
    --ink: #3f2c17;
    --ink-soft: #6e5539;
    --accent: #7c3f22;
    --accent-soft: #7c3f2233;
    --line: #b39c72;
    --tab-bg: #c3a874;
    --room: #b89f77;
    --shadow: rgba(40,25,5,.4);
  }
  html[data-theme="mint"]{
    --paper: #eaf2ee;
    --paper-2: #dcebe4;
    --ink: #223a33;
    --ink-soft: #4d6b61;
    --accent: #2f7d63;
    --accent-soft: #2f7d6333;
    --line: #bcd6cb;
    --tab-bg: #cfe6dc;
    --room: #c3dbd1;
    --shadow: rgba(20,45,35,.3);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background: var(--room);
    font-family: 'Source Serif 4', serif;
    color: var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    transition: background .4s ease;
    overflow-x:hidden;
  }

  /* ===== TOP CONTROL BAR ===== */
  .toolbar{
    width:100%;
    max-width:1100px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:14px 18px 6px;
  }
  .brand{
    font-family:'Caveat', cursive;
    font-size:28px;
    color:var(--ink);
    letter-spacing:.5px;
  }
  .controls{
    display:flex;
    align-items:center;
    gap:14px;
    flex-wrap:wrap;
  }
  .ctrl-group{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:5px 8px;
  }
  .ctrl-label{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--ink-soft);
    margin-right:2px;
  }
  .swatch{
    width:20px;height:20px;border-radius:50%;
    border:2px solid transparent;
    cursor:pointer;
    transition:transform .15s ease, border-color .15s ease;
  }
  .swatch:hover{transform:scale(1.15);}
  .swatch.active{border-color:var(--ink);}
  .sw-parchment{background:linear-gradient(135deg,#f2e8d5,#a34d2e);}
  .sw-night{background:linear-gradient(135deg,#21201c,#d99a56);}
  .sw-kraft{background:linear-gradient(135deg,#d8c4a0,#7c3f22);}
  .sw-mint{background:linear-gradient(135deg,#eaf2ee,#2f7d63);}

  button.icon-btn{
    font-family:'JetBrains Mono', monospace;
    background:var(--paper);
    color:var(--ink);
    border:1px solid var(--line);
    border-radius:7px;
    padding:5px 10px;
    font-size:13px;
    cursor:pointer;
    transition:background .15s ease;
  }
  button.icon-btn:hover{background:var(--accent-soft);}
  #pageJumpInput{
    width:46px;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    text-align:center;
    background:var(--paper);
    border:1px solid var(--line);
    color:var(--ink);
    border-radius:6px;
    padding:4px 2px;
  }

  /* ===== BOOK STAGE ===== */
  .stage-wrap{
    display:flex;
    align-items:stretch;
    gap:16px;
    width:100%;
    max-width:1300px;
    padding:10px 18px 30px;
  }

  /* ---- Side index panel ---- */
  .index-panel{
    width:230px;
    flex-shrink:0;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 14px 10px;
    max-height: min(720px, 78vh);
    overflow-y:auto;
    position:sticky;
    top:14px;
    align-self:flex-start;
  }
  .index-panel::-webkit-scrollbar{width:6px;}
  .index-panel::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
  .index-heading{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:8px;
  }
  .index-entry{
    display:flex;
    gap:8px;
    align-items:baseline;
    padding:6px 4px;
    border-radius:6px;
    cursor:pointer;
    font-size:12.5px;
    line-height:1.3;
    color:var(--ink);
    transition:background .15s ease, color .15s ease;
  }
  .index-entry:hover{background:var(--accent-soft);}
  .index-entry.current{
    background:var(--accent-soft);
    color:var(--accent);
    font-weight:700;
  }
  .index-entry .idx-num{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    color:var(--ink-soft);
    flex-shrink:0;
    width:16px;
  }

  /* ---- Left flip bar ---- */
  .flip-col{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    flex-shrink:0;
  }
  .flip-arrow{
    width:26px;height:22px;
    flex-shrink:0;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:6px;
    color:var(--ink);
    font-size:11px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background .15s ease, color .15s ease;
  }
  .flip-arrow:hover{background:var(--accent-soft); color:var(--accent);}
  .flip-arrow:disabled{opacity:.3; cursor:default;}
  .flipbar{
    width:16px;
    flex:1 1 auto;
    position:relative;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:8px;
    cursor:pointer;
  }
  .flipbar-tick{
    position:absolute;
    left:3px; right:3px;
    height:2px;
    background:var(--line);
    border-radius:1px;
  }
  .flipbar-handle{
    position:absolute;
    left:2px; right:2px;
    height:22px;
    margin-top:-11px;
    background:var(--accent);
    border-radius:5px;
    box-shadow:0 2px 6px var(--shadow);
    transition: top .3s ease;
  }

  .book-stage{
    perspective: 2400px;
    width:100%;
    max-width:900px;
    aspect-ratio: 5 / 6;
    position:relative;
    margin: 0 auto;
  }
  .book-shadow-base{
    position:absolute;
    inset:6px 0 -14px 0;
    background:var(--shadow);
    filter:blur(18px);
    border-radius:14px;
    z-index:0;
  }
  .book{
    position:absolute;
    inset:0;
    transform-style:preserve-3d;
  }

  .page{
    position:absolute;
    inset:0;
    background: var(--paper);
    border-radius:10px;
    border:1px solid var(--line);
    box-shadow: 0 4px 24px var(--shadow);
    transform-origin: left center;
    backface-visibility:hidden;
    transform: rotateY(0deg);
    transition: transform .85s cubic-bezier(.65,.05,.36,1);
    overflow:hidden;
    padding: 30px 36px 26px;
  }

  .page-content{
    position:relative;
    height:100%;
    overflow-y:auto;
    font-size: calc(14.5px * var(--content-scale));
    line-height:1.55;
  }
  .page-content::-webkit-scrollbar{width:6px;}
  .page-content::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}

  .page-eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:calc(10px * var(--content-scale));
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:4px;
  }
  .page-title{
    font-family:'Caveat', cursive;
    font-size:calc(30px * var(--content-scale));
    color:var(--ink);
    margin:0 0 10px;
    line-height:1.1;
  }
  .page-content h4{
    font-size:calc(15px * var(--content-scale));
    margin:14px 0 4px;
    color:var(--accent);
    font-family:'Source Serif 4', serif;
    font-weight:700;
  }
  .page-content p{margin:0 0 8px;}
  .page-content ul{margin:0 0 8px 0; padding-left:18px;}
  .page-content li{margin-bottom:3px;}
  .page-content table{
    width:100%;
    border-collapse:collapse;
    margin:8px 0 12px;
    font-size:calc(12.5px * var(--content-scale));
  }
  .page-content th, .page-content td{
    border:1px solid var(--line);
    padding:5px 7px;
    text-align:left;
    vertical-align:top;
  }
  .page-content th{
    background:var(--accent-soft);
    font-family:'JetBrains Mono', monospace;
    font-size:calc(10.5px * var(--content-scale));
    text-transform:uppercase;
    letter-spacing:.5px;
  }
  .page-content .note{
    font-style:italic;
    color:var(--ink-soft);
    font-size:calc(12px * var(--content-scale));
    border-left:2px solid var(--accent);
    padding-left:8px;
    margin-top:10px;
  }
  .factor-grid{
    display:flex;
    flex-direction:column;
    gap:0;
    height:100%;
  }
  .factor-block{
    padding:9px 0;
    border-bottom:1px dotted var(--line);
  }
  .factor-block:last-child{border-bottom:none;}
  .factor-block h4{
    margin:0 0 3px;
    font-size:calc(14px * var(--content-scale));
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .factor-block .pts{
    font-family:'JetBrains Mono', monospace;
    font-size:calc(10.5px * var(--content-scale));
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:.5px;
    font-weight:400;
  }
  .factor-block p{margin:0; color:var(--ink); font-size:calc(12.5px * var(--content-scale));}
  .page-number{
    position:absolute;
    bottom:8px; right:14px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
  }

  /* Index / TOC page */
  .toc-list{list-style:none; margin:0; padding:0; columns:1;}
  .toc-item{
    display:flex;
    justify-content:space-between;
    gap:8px;
    padding:5px 0;
    border-bottom:1px dotted var(--line);
    cursor:pointer;
    font-size:calc(13.5px * var(--content-scale));
  }
  .toc-item:hover{color:var(--accent);}
  .toc-num{font-family:'JetBrains Mono', monospace; color:var(--ink-soft); font-size:calc(11px * var(--content-scale));}

  /* ===== BOTTOM NAV ===== */
  .bottom-nav{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    padding:6px 0 26px;
  }
  .nav-arrow{
    background:var(--paper);
    border:1px solid var(--line);
    color:var(--ink);
    width:38px;height:38px;
    border-radius:50%;
    font-size:16px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s ease, transform .15s ease;
  }
  .nav-arrow:hover{background:var(--accent-soft); transform:scale(1.06);}
  .nav-arrow:disabled{opacity:.3; cursor:default; transform:none;}
  .page-indicator{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    min-width:70px;
    text-align:center;
  }

  @media (max-width: 900px){
    .index-panel{display:none;}
    .flip-col{display:none;}
    .toolbar{justify-content:center; text-align:center;}
    .brand{width:100%; text-align:center;}
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="brand">The Compounding Notebook</div>
  <div class="controls">
    <div class="ctrl-group" title="Reading theme">
      <span class="ctrl-label">Theme</span>
      <div class="swatch sw-parchment active" data-theme="parchment"></div>
      <div class="swatch sw-night" data-theme="night"></div>
      <div class="swatch sw-kraft" data-theme="kraft"></div>
      <div class="swatch sw-mint" data-theme="mint"></div>
    </div>
    <div class="ctrl-group" title="Text size">
      <span class="ctrl-label">Aa</span>
      <button class="icon-btn" id="fontMinus">A-</button>
      <button class="icon-btn" id="fontPlus">A+</button>
    </div>
    <div class="ctrl-group" title="Jump to page">
      <span class="ctrl-label">Go to</span>
      <input type="number" id="pageJumpInput" min="1" value="1">
      <button class="icon-btn" id="pageJumpBtn">Go</button>
    </div>
  </div>
</div>

<div class="stage-wrap">
  <div class="index-panel" id="indexPanel">
    <div class="index-heading">Index</div>
    <div id="indexList"></div>
  </div>
  <div class="flip-col">
    <button class="flip-arrow" id="flipUp" title="Previous page">&#9650;</button>
    <div class="flipbar" id="flipbar"></div>
    <button class="flip-arrow" id="flipDown" title="Next page">&#9660;</button>
  </div>
  <div class="book-stage">
    <div class="book-shadow-base"></div>
    <div class="book" id="book"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-arrow" id="prevBtn">&#10094;</button>
  <span class="page-indicator" id="pageIndicator">1 / 1</span>
  <button class="nav-arrow" id="nextBtn">&#10095;</button>
</div>

// Build TOC html once pages array exists
pages[0].body = `<ul class="toc-list">` + pages.map((p,i)=>{
  if(i===0) return '';
  return `<li class="toc-item" onclick="jumpTo(${i})"><span>${p.title}</span><span class="toc-num">${(i+1).toString().padStart(2,'0')}</span></li>`;
}).join('') + `</ul>`;

const bookEl = document.getElementById('book');
const indexListEl = document.getElementById('indexList');
const flipbarEl = document.getElementById('flipbar');
const total = pages.length;
let current = 0;

pages.forEach((p, i)=>{
  const pageDiv = document.createElement('div');
  pageDiv.className = 'page';
  pageDiv.dataset.index = i;
  pageDiv.style.zIndex = total - i;
  pageDiv.innerHTML = `
    <div class="page-content">
      <div class="page-eyebrow">${p.eyebrow}</div>
      <div class="page-title">${p.title}</div>
      ${p.body}
    </div>
    <div class="page-number">${i+1} / ${total}</div>
  `;
  bookEl.appendChild(pageDiv);

  const entry = document.createElement('div');
  entry.className = 'index-entry';
  entry.innerHTML = `<span class="idx-num">${(i+1).toString().padStart(2,'0')}</span><span>${p.title}</span>`;
  entry.onclick = ()=>jumpTo(i);
  indexListEl.appendChild(entry);

  const tick = document.createElement('div');
  tick.className = 'flipbar-tick';
  tick.style.top = ((i/(total-1))*100) + '%';
  flipbarEl.appendChild(tick);
});

const flipHandle = document.createElement('div');
flipHandle.className = 'flipbar-handle';
flipbarEl.appendChild(flipHandle);

const pageEls = Array.from(bookEl.children);
const indexEls = Array.from(indexListEl.children);

function render(animate){
  pageEls.forEach((el, i)=>{
    if(!animate) el.style.transition = 'none';
    el.style.transform = i < current ? 'rotateY(-180deg)' : 'rotateY(0deg)';
    if(!animate){
      // force reflow then restore transition
      void el.offsetWidth;
      el.style.transition = '';
    }
  });
  indexEls.forEach((t,i)=> t.classList.toggle('current', i===current));
  const activeEntry = indexEls[current];
  if(activeEntry) activeEntry.scrollIntoView({block:'nearest'});
  flipHandle.style.top = ((current/(total-1))*100) + '%';
  document.getElementById('pageIndicator').textContent = (current+1) + ' / ' + total;
  document.getElementById('pageJumpInput').value = current+1;
  document.getElementById('prevBtn').disabled = current===0;
  document.getElementById('nextBtn').disabled = current===total-1;
  document.getElementById('flipUp').disabled = current===0;
  document.getElementById('flipDown').disabled = current===total-1;
}

function flipbarJumpFromEvent(e){
  const rect = flipbarEl.getBoundingClientRect();
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const ratio = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
  jumpTo(Math.round(ratio * (total-1)));
}
flipbarEl.addEventListener('click', flipbarJumpFromEvent);
let draggingFlipbar = false;
flipHandle.addEventListener('mousedown', ()=> draggingFlipbar = true);
flipHandle.addEventListener('touchstart', ()=> draggingFlipbar = true, {passive:true});
window.addEventListener('mousemove', e=>{ if(draggingFlipbar) flipbarJumpFromEvent(e); });
window.addEventListener('touchmove', e=>{ if(draggingFlipbar) flipbarJumpFromEvent(e); }, {passive:true});
window.addEventListener('mouseup', ()=> draggingFlipbar = false);
window.addEventListener('touchend', ()=> draggingFlipbar = false);

function jumpTo(i){
  i = Math.max(0, Math.min(total-1, i));
  if(i === current) return;
  current = i;
  render(false);
}

function next(){
  if(current < total-1){
    current++;
    render(true);
  }
}
function prev(){
  if(current > 0){
    current--;
    render(true);
  }
}

document.getElementById('nextBtn').onclick = next;
document.getElementById('prevBtn').onclick = prev;
document.getElementById('flipDown').onclick = next;
document.getElementById('flipUp').onclick = prev;
document.getElementById('pageJumpBtn').onclick = ()=>{
  const v = parseInt(document.getElementById('pageJumpInput').value, 10);
  if(!isNaN(v)) jumpTo(v-1);
};
document.getElementById('pageJumpInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') document.getElementById('pageJumpBtn').click();
});

document.addEventListener('keydown', e=>{
  if(e.key === 'ArrowRight') next();
  if(e.key === 'ArrowLeft') prev();
});

// swipe support
let touchX = null;
bookEl.addEventListener('touchstart', e=> touchX = e.touches[0].clientX);
bookEl.addEventListener('touchend', e=>{
  if(touchX===null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if(dx < -40) next();
  if(dx > 40) prev();
  touchX = null;
});

// theme switching
document.querySelectorAll('.swatch').forEach(sw=>{
  sw.addEventListener('click', ()=>{
    document.documentElement.setAttribute('data-theme', sw.dataset.theme);
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
    sw.classList.add('active');
  });
});

// font scaling
let scale = 1;
const root = document.documentElement;
document.getElementById('fontPlus').onclick = ()=>{
  scale = Math.min(1.5, +(scale + 0.1).toFixed(2));
  root.style.setProperty('--content-scale', scale);
};
document.getElementById('fontMinus').onclick = ()=>{
  scale = Math.max(0.75, +(scale - 0.1).toFixed(2));
  root.style.setProperty('--content-scale', scale);
};

document.getElementById('pageJumpInput').max = total;
render(false);
</script>
